<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ZAGON — Gestión</title>

<!-- FUENTES CORRECTAS -->
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;700&display=swap" rel="stylesheet">

<style>
  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --surface2: #1c1c1c;
    --border: #272727;
    --text: #efefef;
    --muted2: #888;
    --red: #e53935;
    --yellow: #fdd835;
    --green: #43a047;
    --blue: #2196f3;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
    padding-bottom: 100px;
  }

  /* HEADER */
  .topbar {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(10,10,10,0.95);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 14px 16px 10px;
  }

  .topbar-row1 {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.2rem;
    letter-spacing: 6px;
  }

  .logo span {
    color: var(--red);
  }

  .btn-map {
    background: var(--blue);
    color: white;
    border: none;
    border-radius: 6px;
    padding: 8px 14px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 0.9rem;
    letter-spacing: 1.5px;
    text-decoration: none;
  }

  /* SEARCH */
  .search-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    color: var(--text);
    font-size: 0.9rem;
    outline: none;
  }

  /* STATS */
  .stats {
    display: grid;
    grid-template-columns: repeat(3,1fr);
    gap: 8px;
    padding: 14px 16px;
  }

  .stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px;
    text-align: center;
  }

  .stat .num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    display: block;
  }

  .stat.red .num { color: var(--red); }
  .stat.yellow .num { color: var(--yellow); }
  .stat.green .num { color: var(--green); }

  .stat .lbl {
    font-size: 0.65rem;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted2);
  }

  /* CONTENT */
  .content {
    padding: 0 16px;
  }

  .section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 2px;
    color: var(--muted2);
    margin: 18px 0 10px;
  }

  .card {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 8px;
    border-left: 4px solid transparent;
  }

  .card.red { border-left-color: var(--red); }
  .card.yellow { border-left-color: var(--yellow); }
  .card.green { border-left-color: var(--green); }

  .card-name {
    font-size: 0.9rem;
    font-weight: 600;
    text-transform: uppercase;
    flex: 1;
    padding-right: 10px;
  }

  /* BUTTONS */
  .pills {
    display: flex;
    gap: 4px;
  }

  .pill {
    border: none;
    border-radius: 4px;
    padding: 6px 10px;
    font-size: 0.65rem;
    font-weight: 800;
    cursor: pointer;
    opacity: 0.25;
    transition: 0.2s;
  }

  .pill.active {
    opacity: 1;
  }

  .pill-red {
    background: var(--red);
    color: white;
  }

  .pill-yellow {
    background: var(--yellow);
    color: black;
  }

  .pill-green {
    background: var(--green);
    color: white;
  }

  /* FAB */
  .fab {
    position: fixed;
    bottom: 25px;
    right: 20px;
    width: 58px;
    height: 58px;
    border-radius: 50%;
    background: white;
    color: black;
    border: none;
    font-size: 2rem;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(0,0,0,0.5);
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-row1">
    <div class="logo">ZAG<span>O</span>N</div>

    <a href="https://www.google.com/maps/d/u/0/viewer?mid=1mH6XzW-Xl2Xy1zO87n9K5iZ9xN8" target="_blank" class="btn-map">
      📍 MAPA
    </a>
  </div>

  <input
    class="search-input"
    id="search-box"
    placeholder="BUSCAR CLIENTE..."
    oninput="renderAll()"
  >
</div>

<div class="stats">
  <div class="stat red">
    <span class="num" id="cnt-red">0</span>
    <span class="lbl">Técnico</span>
  </div>

  <div class="stat yellow">
    <span class="num" id="cnt-yellow">0</span>
    <span class="lbl">Instalación</span>
  </div>

  <div class="stat green">
    <span class="num" id="cnt-green">0</span>
    <span class="lbl">Listos</span>
  </div>
</div>

<div class="content">
  <div>
    <div class="section-title">SERVICIO TÉCNICO</div>
    <div id="list-red"></div>
  </div>

  <div>
    <div class="section-title">INSTALACIONES</div>
    <div id="list-yellow"></div>
  </div>

  <div>
    <div class="section-title">COMPLETADOS</div>
    <div id="list-green"></div>
  </div>
</div>

<button class="fab" onclick="alert('Aquí puedes agregar nuevos clientes manualmente.')">+</button>

<script>
const FULL_LIST = [
  { name: "CORAZÓN DE MAR", type: "red" },
  { name: "EDUARDO GYM", type: "red" },
  { name: "ERIKA BATISTA", type: "red" },
  { name: "DANIEL TIENDA", type: "red" },
  { name: "RAUL MARQUEZ", type: "red" },
  { name: "JORGE HERNANDEZ", type: "red" },
  { name: "MAYQUE HERRERA", type: "red" },
  { name: "BLANCA GONZALEZ", type: "red" },
  { name: "JESSICA GONZALEZ", type: "red" },
  { name: "TERESA", type: "red" },
  { name: "FELIPE NORIEGA", type: "yellow" },
  { name: "TONO CONCRETOS", type: "yellow" },
  { name: "OSCAR BECCERRA 4", type: "yellow" },
  { name: "JOSE PADILLA", type: "yellow" },
  { name: "BERTHA ALICIA", type: "green" }
];

let clients = JSON.parse(localStorage.getItem("zagon_v5")) || FULL_LIST;

function save() {
  localStorage.setItem("zagon_v5", JSON.stringify(clients));
}

function setType(name, type) {
  const client = clients.find(c => c.name === name);
  if (client) {
    client.type = type;
    save();
    renderAll();
  }
}

function createCard(client) {
  const card = document.createElement("div");
  card.className = `card ${client.type}`;

  card.innerHTML = `
    <div class="card-name">${client.name}</div>
    <div class="pills">
      <button class="pill pill-red ${client.type === "red" ? "active" : ""}"
        onclick='setType(${JSON.stringify(client.name)}, "red")'>
        TÉC
      </button>

      <button class="pill pill-yellow ${client.type === "yellow" ? "active" : ""}"
        onclick='setType(${JSON.stringify(client.name)}, "yellow")'>
        INS
      </button>

      <button class="pill pill-green ${client.type === "green" ? "active" : ""}"
        onclick='setType(${JSON.stringify(client.name)}, "green")'>
        ✓
      </button>
    </div>
  `;

  return card;
}

function renderAll() {
  const search = document.getElementById("search-box").value.trim().toUpperCase();

  const lists = {
    red: document.getElementById("list-red"),
    yellow: document.getElementById("list-yellow"),
    green: document.getElementById("list-green")
  };

  let counts = {
    red: 0,
    yellow: 0,
    green: 0
  };

  Object.values(lists).forEach(list => list.innerHTML = "");

  clients.forEach(client => {
    if (search && !client.name.includes(search)) return;

    counts[client.type]++;

    lists[client.type].appendChild(createCard(client));
  });

  document.getElementById("cnt-red").textContent = counts.red;
  document.getElementById("cnt-yellow").textContent = counts.yellow;
  document.getElementById("cnt-green").textContent = counts.green;
}

renderAll();
</script>

</body>
</html>
